:: conditional-return-test.ini
::
:: Regression test for one specific RGTRU implementation bug found during
:: the 3B2 renovation work. This is a focused instruction-level check; it is
:: not expected to fail during normal smoke testing unless the conditional
:: return behavior regresses.

echof -n "** 3B2: RGTRU conditional return test: "

:: RGTRU returns on unsigned greater-than, which is C clear and Z clear.
dep pc 2001000
dep sp 2002000
dep psw 0
dep -b 2001000 54
dep 2001ffc 11111111
step
if (PC != 0x11111111) echof "RGTRU PC failed for C=0,Z=0"; exit 1
if (SP != 0x02001FFC) echof "RGTRU SP failed for C=0,Z=0"; exit 1

:: Equal is not greater-than, so Z set must not return.
dep pc 2001000
dep sp 2002000
dep psw 100000
dep -b 2001000 54
dep 2001ffc 22222222
step
if (PC != 0x02001001) echof "RGTRU PC failed for C=0,Z=1"; exit 1
if (SP != 0x02002000) echof "RGTRU SP failed for C=0,Z=1"; exit 1

:: Unsigned lower is not greater-than, so C set must not return.
dep pc 2001000
dep sp 2002000
dep psw 40000
dep -b 2001000 54
dep 2001ffc 33333333
step
if (PC != 0x02001001) echof "RGTRU PC failed for C=1,Z=0"; exit 1
if (SP != 0x02002000) echof "RGTRU SP failed for C=1,Z=0"; exit 1

:: C and Z set is not a normal CMP result, but RGTRU still must not return.
dep pc 2001000
dep sp 2002000
dep psw 140000
dep -b 2001000 54
dep 2001ffc 44444444
step
if (PC != 0x02001001) echof "RGTRU PC failed for C=1,Z=1"; exit 1
if (SP != 0x02002000) echof "RGTRU SP failed for C=1,Z=1"; exit 1

echof "passed."

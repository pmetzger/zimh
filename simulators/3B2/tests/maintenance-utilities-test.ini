:: maintenance-utilities-test.ini
::
:: Boot the AT&T 3B2 Maintenance Utilities diskette far enough to prove
:: the built-in ROM path, integrated floppy, console interaction, and
:: DGMON monitor are working together. Do not run destructive formatter
:: phases.

set cpu 4M
if "%SIMH_TEST_OUTPUT_DIR%" == "" echof "SIMH_TEST_OUTPUT_DIR is required\n"; exit 1
copy artifacts/3b2_400_maint_nvram.bin %SIMH_TEST_OUTPUT_DIR%/3b2_400_maint_nvram.bin
attach nvram %SIMH_TEST_OUTPUT_DIR%/3b2_400_maint_nvram.bin
set idisk0 hd135
attach -n idisk0 %SIMH_TEST_OUTPUT_DIR%/empty-hd135.img
attach -r ifloppy artifacts/3B2_Maintenance_Utilities_4-0.img

runlimit 2000M instructions
set on
on runtime echof "\r\n*** 3B2 Maintenance test timed out ***\n"; exit 1

expect "SYSTEM FAILURE" send "mcp\r"; go
expect "Enter name of program to execute" send "\r"; go
expect "Enter Load Device Option Number" send "0\r"; go
expect "Enter name of boot file" send "dgmon\r"; go
expect "Did you boot filledt?" send "y\r"; go
expect "DGMON > " send "help\r"; go
expect "DGMON > " send "q\r"; go
expect "Enter name of program to execute" echof "passed.\n"; exit 0

echof -n "** 3B2: Maintenance Utilities DGMON smoke test: "
boot

:: vax-sysdev-bool_test.ini
::
:: Check that the KA655 halt/autoboot flag still behaves as a one-bit
:: simulator register after conversion to C bool.

echof -n "** VAX: SYSD bool flag test: "

if (HLTENAB != 1) echof "initial HLTENAB not set"; exit 1

set cpu autoboot
if (HLTENAB != 0) echof "AUTOBOOT did not clear HLTENAB"; exit 1

deposit sysd hltenab 1
if (HLTENAB != 1) echof "deposit did not set HLTENAB"; exit 1

deposit sysd hltenab 0
if (HLTENAB != 0) echof "deposit did not clear HLTENAB"; exit 1

set cpu noautoboot
if (HLTENAB != 1) echof "NOAUTOBOOT did not set HLTENAB"; exit 1

echof "passed."
exit 0

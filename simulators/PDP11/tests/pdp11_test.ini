:: PDP-11 Integration Tests

echof "** PDP-11: RR register bus reads mask unimplemented bits: "

set rp disabled
set rr enabled

deposit rr rpba 177777
deposit rr rpca 177777
deposit rr rpda 177777

:: MOV @#RPBA,1100
:: MOV @#RPCA,1102
:: MOV @#RPDA,1104
:: HLT
deposit -m 1000 mov @#176720,1100
deposit -m 1006 mov @#176722,1102
deposit -m 1014 mov @#176724,1104
deposit -m 1022 halt

go 1000

if 1100!=177776 echof "RR RPBA leaked unimplemented bits"; exit 1
if 1102!=000777 echof "RR RPCA leaked unimplemented bits"; exit 1
if 1104!=017777 echof "RR RPDA leaked unimplemented bits"; exit 1

echof "passed"
exit 0

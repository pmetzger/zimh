:: AltairZ80 Integration Tests
::
:: This narrow ICOM regression test is temporary coverage for upstream PR
:: 524. Remove it once AltairZ80 has broader integration tests that exercise
:: the ICOM controller through a real operating-system or diagnostic workload.

echof "** AltairZ80: ICOM CLEAR preserves buffer indices: "

set icom enabled

:: MVI A,0xAA; OUT 0xC1      data for write buffer
:: MVI A,0x31; OUT 0xC0      load write buffer, advancing WBUF
:: MVI A,0x41; OUT 0xC0      shift read buffer, advancing RBUF
:: MVI A,0x81; OUT 0xC0      clear status flags only
:: HLT
deposit 0 3e
deposit 1 aa
deposit 2 d3
deposit 3 c1
deposit 4 3e
deposit 5 31
deposit 6 d3
deposit 7 c0
deposit 8 3e
deposit 9 41
deposit 10 d3
deposit 11 c0
deposit 12 3e
deposit 13 81
deposit 14 d3
deposit 15 c0
deposit 16 76

go 0

if icom rbuf!=1 echof "ICOM CLEAR reset RBUF"; exit 1
if icom wbuf!=1 echof "ICOM CLEAR reset WBUF"; exit 1

echof "passed"
exit 0

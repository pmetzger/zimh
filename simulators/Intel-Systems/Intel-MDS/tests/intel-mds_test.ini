:: Intel-MDS Integration Tests
::
:: Exercise the Intel HEX load/dump path through the simulator command
:: interface, so the i8080 sim_load callback is covered outside unit tests.

cd %~p0

echof -n "** Intel-MDS: Intel HEX load/dump callback: "

set sys model=MDS-225
load -h i8080-loader.hex
if 2120!=01 echof "LOAD -H failed at 2120"; exit 1
if 2121!=02 echof "LOAD -H failed at 2121"; exit 1
if 2122!=03 echof "LOAD -H failed at 2122"; exit 1
if 2100!=aa echof "LOAD -H failed lowercase record"; exit 1

dump -h %SIMH_TEST_OUTPUT_DIR%/i8080-loader-dump.hex 2120 2122

deposit 2120 00
deposit 2121 00
deposit 2122 00

load -h %SIMH_TEST_OUTPUT_DIR%/i8080-loader-dump.hex
if 2120!=01 echof "DUMP -H reload failed at 2120"; exit 1
if 2121!=02 echof "DUMP -H reload failed at 2121"; exit 1
if 2122!=03 echof "DUMP -H reload failed at 2122"; exit 1

echof "passed"
exit 0
